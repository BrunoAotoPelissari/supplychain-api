get:
  tags:
    - Warehouses
  summary: Buscar armazém por ID
  parameters:
    - $ref: "../swagger.yaml#/components/parameters/IdParam"
  responses:
    200:
      description: Armazém encontrado
      content:
        application/json:
          schema:
            $ref: "../schemas/Warehouse.yaml"
    404:
      description: Armazém não encontrado

put:
  tags:
    - Warehouses
  summary: Atualizar armazém
  parameters:
    - $ref: "../swagger.yaml#/components/parameters/IdParam"
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: "../schemas/Warehouse.yaml"
  responses:
    200:
      description: Armazém atualizado

delete:
  tags:
    - Warehouses
  summary: Remover armazém
  parameters:
    - $ref: "../swagger.yaml#/components/parameters/IdParam"
  responses:
    204:
      description: Armazém removido
