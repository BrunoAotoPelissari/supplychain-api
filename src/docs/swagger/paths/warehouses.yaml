get:
  tags:
    - Warehouses
  summary: Listar armazéns
  responses:
    200:
      description: Lista de armazéns
      content:
        application/json:
          schema:
            type: array
            items:
              $ref: "../schemas/Warehouse.yaml"

post:
  tags:
    - Warehouses
  summary: Criar armazém
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: "../schemas/Warehouse.yaml"
  responses:
    201:
      description: Armazém criado
