get:
  tags:
    - Products
  summary: Listar produtos
  responses:
    200:
      description: Lista de produtos
      content:
        application/json:
          schema:
            type: array
            items:
              $ref: "../schemas/Product.yaml"

post:
  tags:
    - Products
  summary: Criar produto
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: "../schemas/Product.yaml"
  responses:
    201:
      description: Produto criado
