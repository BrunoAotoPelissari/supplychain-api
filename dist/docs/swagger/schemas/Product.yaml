type: object
properties:
  id:
    type: string
    example: "prod-001"
  name:
    type: string
    example: "Peito de Frango Congelado"
  sku:
    type: string
    example: "SEARA-FRANGO-001"
  supplierId:
    type: string
    example: "1"
  price:
    type: number
    format: float
    example: 19.90
required:
  - name
  - sku
  - supplierId
  - price
