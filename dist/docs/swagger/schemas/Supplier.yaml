type: object
properties:
  id:
    type: string
    example: "sup-001"
  name:
    type: string
    example: "Seara Alimentos"
  contactEmail:
    type: string
    format: email
    example: "contato@seara.com"
  phone:
    type: string
    example: "+55 41 99999-9999"
  active:
    type: boolean
    example: true
required:
  - name
  - contactEmail
  - phone
