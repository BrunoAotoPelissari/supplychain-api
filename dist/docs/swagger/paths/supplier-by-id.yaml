get:
  tags:
    - Suppliers
  summary: Buscar fornecedor por ID
  parameters:
    - $ref: "../swagger.yaml#/components/parameters/IdParam"
  responses:
    200:
      description: Fornecedor encontrado
      content:
        application/json:
          schema:
            $ref: "../schemas/Supplier.yaml"
    404:
      description: Fornecedor não encontrado

put:
  tags:
    - Suppliers
  summary: Atualizar fornecedor
  parameters:
    - $ref: "../swagger.yaml#/components/parameters/IdParam"
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: "../schemas/Supplier.yaml"
  responses:
    200:
      description: Fornecedor atualizado

delete:
  tags:
    - Suppliers
  summary: Remover fornecedor
  parameters:
    - $ref: "../swagger.yaml#/components/parameters/IdParam"
  responses:
    204:
      description: Fornecedor removido
