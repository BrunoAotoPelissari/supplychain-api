get:
  tags:
    - Orders
  summary: Listar pedidos
  responses:
    200:
      description: Lista de pedidos
      content:
        application/json:
          schema:
            type: array
            items:
              $ref: "../schemas/Order.yaml"

post:
  tags:
    - Orders
  summary: Criar pedido
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: "../schemas/Order.yaml"
  responses:
    201:
      description: Pedido criado
