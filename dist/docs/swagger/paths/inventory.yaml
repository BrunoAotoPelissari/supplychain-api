get:
  tags:
    - Inventory
  summary: Listar estoque
  responses:
    200:
      description: Estoque atual
      content:
        application/json:
          schema:
            type: array
            items:
              $ref: "../schemas/Inventory.yaml"

post:
  tags:
    - Inventory
  summary: Registrar estoque
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: "../schemas/Inventory.yaml"
  responses:
    201:
      description: Estoque registrado
