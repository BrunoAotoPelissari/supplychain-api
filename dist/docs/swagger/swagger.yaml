openapi: 3.0.3

info:
  title: Supply Chain API
  description: >
    API para gestão de cadeia logística — incluindo fornecedores,
    produtos, armazéns, estoque, pedidos e transporte.
    Inspirada em soluções de supply chain e WMS.
  version: 1.0.0

servers:
  - url: http://localhost:3000
    description: Servidor local de desenvolvimento

tags:
  - name: Suppliers
    description: Gestão de fornecedores
  - name: Products
    description: Catálogo de produtos
  - name: Warehouses
    description: Gestão de armazéns
  - name: Inventory
    description: Controle de estoque
  - name: Orders
    description: Pedidos
  - name: Shipments
    description: Transporte e rastreamento

paths:
  /suppliers:
    $ref: "./paths/suppliers.yaml"
  /suppliers/{id}:
    $ref: "./paths/suppliers-by-id.yaml"

  /products:
    $ref: "./paths/products.yaml"
  /products/{id}:
    $ref: "./paths/products-by-id.yaml"

  /warehouses:
    $ref: "./paths/warehouses.yaml"
  /warehouses/{id}:
    $ref: "./paths/warehouses-by-id.yaml"

  /inventory:
    $ref: "./paths/inventory.yaml"

  /orders:
    $ref: "./paths/orders.yaml"
  /orders/{id}:
    $ref: "./paths/orders-by-id.yaml"

  /shipments:
    $ref: "./paths/shipments.yaml"
  /shipments/{id}:
    $ref: "./paths/shipments-by-id.yaml"

components:
  schemas:
    Supplier:
      $ref: "./schemas/Supplier.yaml"
    Product:
      $ref: "./schemas/Product.yaml"
    Warehouse:
      $ref: "./schemas/Warehouse.yaml"
    Inventory:
      $ref: "./schemas/Inventory.yaml"
    Order:
      $ref: "./schemas/Order.yaml"
    Shipment:
      $ref: "./schemas/Shipment.yaml"

  parameters:
    IdParam:
      name: id
      in: path
      required: true
      schema:
        type: string
      example: "1"
